steps:
  - id: 0
    command: proj-init-bootstrap
    title: Register Target Repository
    kind: utility            # not a document-producing _run-step.md step
    runner: false            # skip the _run-step.md branch/commit/PR flow
    branch: null             # Step-00 runs on the kit; it does not branch the target
    outputs:
      - .proj-init/state.json   # gitignored, operator-local; not a source-of-truth doc
    guide: docs/guides/proj-init/00-bootstrap.md
    script: scripts/bootstrap-target-repo.mjs
    upstream: []
    owner: Operator
    reviewer: Operator
    commitMessage: null      # Step-00 commits nothing
    prSummary: null          # Step-00 opens no PR/MR
    finalReminder: "Step-00 is complete when the clone exists and .proj-init/state.json points at it. Nothing is committed, reviewed, or merged; it is not governed by _run-step.md."
    specialActions:
      - Dry-run scripts/bootstrap-target-repo.mjs first; apply only after the operator confirms the target folder and git URL.
      - Clone into an empty or non-existent folder; never write over an existing working tree.
      - Never copy kit machinery (guides, runner, templates, adapters) into the target.

  - id: 1
    command: proj-init-repo-setup
    title: Repo Setup
    branch: init/repo-setup
    outputs:
      - CONTRIBUTING.md
    guide: docs/guides/proj-init/01-repo-setup.md
    upstream: []
    owner: Architect
    reviewer: Architect
    commitMessage: "docs: add repo governance baseline (Step-01)"
    prSummary: "Summarize the branching + self-review governance and any branch protection set on main."
    finalReminder: "Repo governance becomes final only when the Architect merges the PR/MR (self-review checklist complete)."

  - id: 2
    command: proj-init-product
    title: Product Concept
    branch: init/product
    outputs:
      - docs/PRODUCT.md
    guide: docs/guides/proj-init/02-prod-concept.md
    template: docs/guides/proj-init/templates/PRODUCT.template.md
    upstream: []
    owner: Product Owner
    reviewer: Product Owner
    commitMessage: "docs: add PRODUCT.md (Step-02)"
    prSummary: "Summarize the product concept decisions and include the Step-02 reviewer checklist."
    finalReminder: "PRODUCT.md becomes final only when the Product Owner approves and merges the PR/MR."

  - id: 3
    command: proj-init-prd
    title: Product Requirements Document
    branch: init/prd
    outputs:
      - docs/PRD.md
    guide: docs/guides/proj-init/03-prod-requirements.md
    template: docs/guides/proj-init/templates/PRD.template.md
    upstream:
      - docs/PRODUCT.md
    owner: Product Owner
    reviewer: Product Owner
    commitMessage: "docs: add PRD.md (Step-03)"
    prSummary: "Summarize the requirements and include the Step-03 reviewer checklist."
    finalReminder: "PRD.md becomes final only when the Product Owner approves and merges the PR/MR."

  - id: 4
    command: proj-init-architecture
    title: Architecture
    branch: init/architecture
    outputs:
      - docs/ARCHITECTURE.md
    guide: docs/guides/proj-init/04-architecture.md
    template: docs/guides/proj-init/templates/ARCHITECTURE.template.md
    upstream:
      - docs/PRD.md
    owner: Architect
    reviewer: Architect + Product Owner
    commitMessage: "docs: add ARCHITECTURE.md (Step-04)"
    prSummary: "Summarize the design decisions and include the Step-04 reviewer checklist."
    finalReminder: "ARCHITECTURE.md becomes final only when the Architect and Product Owner approve and merge the PR/MR."

  - id: 5
    command: proj-init-techstack
    title: Tech Stack
    branch: init/techstack
    outputs:
      - docs/TECH-STACK.md
      - CONTRIBUTING.md
    guide: docs/guides/proj-init/05-tech-stack.md
    template: docs/guides/proj-init/templates/TECH-STACK.template.md
    upstream:
      - docs/PRD.md
      - docs/ARCHITECTURE.md
    owner: Architect
    reviewer: Architect
    commitMessage: "docs: add TECH-STACK.md and CONTRIBUTING tooling layer (Step-05)"
    prSummary: "Summarize the stack choices, the tooling commands added, and include the Step-05 reviewer checklist."
    finalReminder: "TECH-STACK.md and the CONTRIBUTING.md tooling layer become final only when the Architect approves and merges the PR/MR."
    specialActions:
      - Append the tooling layer to CONTRIBUTING.md using only technologies approved in TECH-STACK.md. Preserve the Step-01 governance layer.

  - id: 6
    command: proj-init-aitoolguide
    title: AI Tool Guide
    branch: init/aitoolguide
    outputs:
      - docs/AI-TOOL-GUIDE.md
      - CLAUDE.md
      - .github/copilot-instructions.md
    conditionalOutputs: true
    guide: docs/guides/proj-init/06-ai-tool-guide.md
    template: docs/guides/proj-init/templates/AI-TOOL-GUIDE.template.md
    upstream:
      - docs/ARCHITECTURE.md
      - docs/TECH-STACK.md
    owner: Architect
    reviewer: Architect
    commitMessage: "docs: add AI-TOOL-GUIDE.md and tool adapters (Step-06)"
    prSummary: "Summarize the AI rules, list the generated adapter files, and include the Step-06 reviewer checklist."
    finalReminder: "AI-TOOL-GUIDE.md and generated adapter files become final only when the Architect approves and merges the PR/MR."
    specialActions:
      - Ask which AI tools the team will use before generating adapters.
      - Generate AI-TOOL-GUIDE.md always.
      - Generate only the adapter files required for the selected tools.
      - Keep shared rules in AI-TOOL-GUIDE.md; adapters contain only tool-specific config.
      - Generate the target's .github/copilot-instructions.md as the downstream project's Copilot rules only. The initiation runner stays in this kit and is never copied into the target.

  - id: 7
    command: proj-init-readme
    title: README
    branch: init/readme
    outputs:
      - README.md
    replacesExisting: true
    guide: docs/guides/proj-init/07-readme.md
    template: docs/guides/proj-init/templates/README.template.md
    upstream:
      - docs/PRODUCT.md
      - docs/PRD.md
      - docs/ARCHITECTURE.md
      - docs/TECH-STACK.md
      - docs/AI-TOOL-GUIDE.md
    owner: Architect
    reviewer: Architect
    commitMessage: "docs: replace boilerplate README with project README (Step-07)"
    prSummary: "Note that the boilerplate README is replaced and include the Step-07 reviewer checklist."
    finalReminder: "README.md becomes final only when the Architect approves and merges the PR/MR. Initiation is complete only after Step-09 is merged."
    specialActions:
      - Replace the target repo's current README with the generated project README.
      - Remove any leftover placeholder or boilerplate content from README.md.
      - Test every command included in README.md before committing.

  - id: 8
    command: proj-init-backlog
    title: Initial Backlog
    branch: init/backlog
    outputs:
      - docs/BACKLOG.md
    conditionalOutputs: true
    guide: docs/guides/proj-init/08-backlog.md
    template: docs/guides/proj-init/templates/BACKLOG.template.md
    upstream:
      - docs/PRODUCT.md
      - docs/PRD.md
      - docs/ARCHITECTURE.md
      - docs/TECH-STACK.md
      - docs/AI-TOOL-GUIDE.md
      - README.md
    owner: Product Owner
    reviewer: Product Owner
    commitMessage: "docs: add BACKLOG.md - Step-08 initial backlog"
    prSummary: "State the epic count, story count, priority breakdown, and include the Step-08 reviewer checklist."
    finalReminder: "BACKLOG.md becomes final only when the Product Owner approves and merges the PR/MR. Once merged, run Step-09 (/proj-init-finalize) to finalize CONTRIBUTING.md."
    specialPreconditions:
      - Detect host issue tracker CLI availability before confirmation: GitHub gh, Azure DevOps az boards, or PENDING manual creation.
    specialActions:
      - Derive epics and stories from PRODUCT.md and PRD.md before creating host items.
      - Present the derived backlog and wait for approval before host writes or file writes.
      - Create host work items one at a time and capture IDs.
      - If no supported CLI is available, record PENDING IDs and manual creation notes in BACKLOG.md.

  - id: 9
    command: proj-init-finalize
    title: Finalize Governance
    branch: init/finalize
    outputs:
      - CONTRIBUTING.md
    replacesExisting: true    # CONTRIBUTING.md is already on main; this transforms it, so skip the "already finalized" precondition
    guide: docs/guides/proj-init/09-finalize.md
    upstream:
      - docs/BACKLOG.md        # gate: cannot run until Step-08 is merged, making this the terminal step
    owner: Architect
    reviewer: Architect
    commitMessage: "docs: finalize CONTRIBUTING.md for the development phase (Step-09)"
    prSummary: "State that the init-only governance block was removed, the permanent core and tooling layer were preserved, and the development-phase stub was left for the team; include the Step-09 reviewer checklist."
    finalReminder: "CONTRIBUTING.md becomes final for the development phase only when the Architect merges the PR/MR. Initiation is complete once this is merged; run /proj-init-cleanup afterward."
    specialActions:
      - Read CONTRIBUTING.md from the target's main.
      - Remove only the fenced INITIATION-ONLY block (markers included). Preserve the permanent governance rules and the entire Step-05 tooling layer verbatim.
      - Insert the DEVELOPMENT-PHASE-GOVERNANCE stub from the guide where the removed block was.
      - If the INITIATION-ONLY markers are absent from CONTRIBUTING.md on main, STOP — do not delete lines by inference.
      - Do not author a full development-phase policy; leave the stub for the team to expand via /proj-init-doc-update.